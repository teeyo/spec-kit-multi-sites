schema_version: "1.0"

extension:
  id: "spec-kit-multi-sites"
  name: "Multi-Sites Spec Kit"
  version: "1.7.0"
  description: "Multi-site aware specify command with per-site spec folders, auto-increment, and multi-site framework support (Drupal, etc.)"
  author: "spec-kit-multi-sites contributors"
  repository: "https://github.com/teeyo/spec-kit-multi-sites"
  homepage: "https://github.com/teeyo/spec-kit-multi-sites"
  license: "MIT"

requires:
  speckit_version: ">=0.1.0"

provides:
  commands:
    - name: "speckit.spec-kit-multi-sites.specify"
      file: "commands/specify.md"
      description: "Create a spec in the right site or core folder with per-site auto-incremented numbering"
    - name: "speckit.spec-kit-multi-sites.clarify"
      file: "commands/clarify.md"
      description: "Review a multi-site spec and resolve ambiguities, gaps, and open questions with the user"
    - name: "speckit.spec-kit-multi-sites.checklist"
      file: "commands/checklist.md"
      description: "Verify a multi-site spec is complete and implementation-ready against a structured checklist"
    - name: "speckit.spec-kit-multi-sites.plan"
      file: "commands/plan.md"
      description: "Generate a technical implementation plan from a multi-site spec and save it as a companion plan file"
    - name: "speckit.spec-kit-multi-sites.research"
      file: "commands/research.md"
      description: "Perform technical research for a multi-site spec and save it as a companion research file"
    - name: "speckit.spec-kit-multi-sites.tasks"
      file: "commands/tasks.md"
      description: "Generate a granular implementation task list from a multi-site spec and plan"

tags:
  - "multi-site"
  - "drupal"
  - "workflow"
  - "process"
